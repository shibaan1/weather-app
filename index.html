<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>

<body>
    <header>
        <h1>WEATHER APP</h1>
    </header>

    <main>
        <div id="search">
            <input id="search-input" type="text" placeholder="Enter city name">
            <button id="search-btn">Search</button>
        </div>

        <div id="current-weather">

            <div class="weather-left">
                <img id="weather-icon" src="" alt="weather-icon">
            </div>

            <div class="weather-right">
                <div class="info-right">
                    <h2 id="city-name">city name</h2>
                    <p id="temperature-display">temp</p>
                </div>

                <div class="info-left">
                    <p id="description">description</p>
                    <p id="humidity">humidity</p>
                    <p id="wind-speed">speed</p>
                </div>

            </div>


        </div>


        <div id="forecast">
            <div id="forecast-container">
                <div id="card1">
                    <p id="day-1"></p>
                    <p id="temperature-display-1"></p>
                    <img id="weather-icon-1" src="" alt="weather-icon-1">
                    <p id="description-1"></p>

                </div>

                <div id="card2">
                    <p id="day-2"></p>
                    <p id="temperature-display-2"></p>
                    <img id="weather-icon-2" src="" alt="weather-icon-2">
                    <p id="description-2"></p>

                </div>

                <div id="card3">
                    <p id="day-3"></p>
                    <p id="temperature-display-3"></p>
                    <img id="weather-icon-3" src="" alt="weather-icon-3">
                    <p id="description-3"></p>
                </div>

                <div id="card4">
                    <p id="day-4"></p>
                    <p id="temperature-display-4"></p>
                    <img id="weather-icon-4" src="" alt="weather-icon-4">
                    <p id="description-4"></p>
                </div>
            </div>
        </div>


    </main>

    <script src="script.js"> </script>
</body>

</html>
